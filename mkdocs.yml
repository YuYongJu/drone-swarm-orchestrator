site_name: drone-swarm
site_description: Python SDK for multi-drone swarm orchestration over MAVLink
site_url: https://yuyongju.github.io/drone-swarm-orchestrator
repo_url: https://github.com/yuyongju/drone-swarm-orchestrator
repo_name: drone-swarm-orchestrator

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Core Concepts: getting-started/concepts.md
  - Tutorials:
    - Your First Swarm: tutorials/first-swarm.md
    - Formation Flying: tutorials/formations.md
    - Custom Missions: tutorials/custom-missions.md
  - API Reference:
    - Swarm: api/swarm.md
    - Drone: api/drone.md
    - Missions: api/missions.md
    - Safety: api/safety.md
    - Telemetry: api/telemetry.md
    - Config: api/config.md
    - Simulation: api/simulation.md
  - Research:
    - Architecture: ARCHITECTURE.md
    - Path Planning Review: LITERATURE_REVIEW_PATH_PLANNING.md
    - Swarm Communication Review: literature-review-swarm-communication.md
  - Blog:
    - State of Drone Swarm Software 2026: blog/state-of-drone-swarm-software-2026.md
  - Contributing: contributing.md
  - Changelog: changelog.md
